context:
  version: "9.2.8"

package:
  name: ghc-bootstrap
  version: ${{ version }}

source:
  - if: osx
    then:
      url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-x86_64-apple-darwin.tar.xz
      sha256: eb78361feaf4277f627cbdc4b849849d09d175d0d878d28433719b7482db27f5
  - if: linux
    then:
      url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-x86_64-centos7-linux.tar.xz
      sha256: 70c3ecbc6457f67ba0e76bd0ca2500bd0edd8262d3236a23422fad7602efa672
  - if: not unix
    then:
      url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-x86_64-unknown-mingw32.tar.xz
      sha256: f11c7270839c50fda44f98b54254ae50340bb58b04f8d81ebcbe67a2827bd511
      target_directory: bootstrap-ghc

build:
  number: 0
  dynamic_linking:
    binary_relocation:
      - ghc-bootstrap/lib/${{ version }}/bin/*
  prefix_detection:
    ignore:
      - ghc-bootstrap/**/*.so
  # We will not need x-compiled ghc-bootstrap
  skip: aarch64 or ppc64le or arm64

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - gmp
    - libffi
    - perl 5.32.*

    - if: linux
      then:
        - ncurses <6,>=5
        - patchelf

    - if: unix
      then:
        - coreutils
        - file
        - make
      else:
        - binutils
        - m2-bash
        - m2-coreutils
        - m2-diffutils
        - m2-findutils
        - m2-grep
        - m2-tar
        - m2-which
  # host:
  #   - gmp
  #   - libffi
  #   - libiconv
  #   - if: not unix
  #     then: binutils
  # ignore_run_exports:
  #   from_package:
  #     - gmp
  #     - libffi
  #     - libiconv

tests:
  - package_contents:
      files:
        - etc/conda/activate.d/ghc-bootstrap_activate${{ ".sh" if unix else ".bat" }}
        
        - ghc-bootstrap/bin/ghc${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/ghc-${{ version }}${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/ghc-pkg-${{ version }}${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/ghc-pkg${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/ghci-${{ version }}${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/ghci${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/haddock-ghc-${{ version }}${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/haddock${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/hp2ps${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/hpc${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/hsc2hs${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/runghc-${{ version }}${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/runghc${{ "" if unix else ".exe" }}
        - ghc-bootstrap/bin/runhaskell${{ "" if unix else ".exe" }}
        
        - if: linux
          then:
            - ghc-bootstrap/lib/ghc-${{ version }}/settings
            - ghc-bootstrap/lib/ghc-${{ version }}/package.conf.d/**
            - ghc-bootstrap/lib/ghc-${{ version }}/private/libncurses.so.5
            - ghc-bootstrap/lib/ghc-${{ version }}/private/libtinfo.so.5
            - ghc-bootstrap/lib/ghc-${{ version }}/private/libtinfow.so.5
        
        - if: osx
          then:
            - ghc-bootstrap/lib/ghc-${{ version }}/lib/settings
            - ghc-bootstrap/lib/ghc-${{ version }}/lib/package.conf.d/**
            - ghc-bootstrap/lib/ghc-${{ version }}/lib/private/libiconv_compat.dylib
        
        - if: not unix
          then:
            - ghc-bootstrap/bin/ghc-iserv-ghc-${{ version }}.exe
            - ghc-bootstrap/bin/ghc-iserv-prof-ghc-${{ version }}.exe
            - ghc-bootstrap/bin/ghc-iserv-prof.exe
            - ghc-bootstrap/bin/ghc-iserv.exe
            - ghc-bootstrap/bin/unlit-ghc-${{ version }}.exe
            - ghc-bootstrap/bin/unlit.exe
            - ghc-bootstrap/bin/ghcii.sh
            - ghc-bootstrap/bin/ghcii${{ version }}.sh

            - ghc-bootstrap/bin/windres.bat

            - ghc-bootstrap/lib/settings
            - ghc-bootstrap/lib/package.conf.d/**
            - ghc-bootstrap/lib/private/libcrt_compat.a

            - ghc-bootstrap/mingw/bin/__unused__
            - ghc-bootstrap/mingw/include/__unused__
            - ghc-bootstrap/mingw/lib/__unused__
            - ghc-bootstrap/mingw/share/__unused__

  - script:
      - if: unix
        then: ${PREFIX}/ghc-bootstrap/bin/ghc --version
        else:
          - CALL %PREFIX%/ghc-bootstrap/bin/windres.bat --help
          - CALL %PREFIX%/ghc-bootstrap/bin/ghc.exe -v --version
    requirements:
      run:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - if: not unix
          then: binutils

  - script:
      - if: unix
        then: |
          ${PREFIX}/ghc-bootstrap/bin/ghc testing/hello.hs -o hello && ./hello && rm -f testing/*.o
          ${PREFIX}/ghc-bootstrap/bin/ghc testing/signal_test.hs -o signal_test && ./signal_test && rm -f testing/*.o
          ${PREFIX}/ghc-bootstrap/bin/ghc testing/iconv_test.hs -o iconv_test && ./iconv_test && rm -f testing/*.o
          ${PREFIX}/ghc-bootstrap/bin/ghc -dynamic testing/hello.hs -o hello_dy && ./hello_dy && rm -f testing/*.o
          ${PREFIX}/ghc-bootstrap/bin/ghc -threaded testing/hello.hs -o hello_th && ./hello_th && rm -f testing/*.o
        else: |
          CALL %PREFIX%\ghc-bootstrap\bin\ghc.exe testing/hello.hs -o hello.exe
          hello.exe
    files:
      recipe:
        - testing/
    requirements:
      run:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - gmp
        - libffi
        - if: not unix
          then: binutils

about:
  homepage: https://haskell.org/ghc/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: Glorious Glasgow Haskell Compilation System
  description: |
    GHC is a state-of-the-art, open source, compiler and interactive environment 
    for the functional language Haskell.
    
    Conda-Forge Requirements:
    - Linux: glibc >= 2.17, clang compiler
    - macOS: macOS >= 10.13, clang compiler
    - Windows: MSYS2/MinGW toolchain, binutils
    Note: Windows builds may show overlinking warnings for system DLLs
    (SHLWAPI.dll, WSOCK32.dll, WINMM.dll). These are benign and don't
    affect functionality.
    
  documentation: https://www.haskell.org/ghc/documentation.html
  repository: https://gitlab.haskell.org/ghc/ghc

extra:
  recipe-maintainers:
    - MementoRC
    - eggzilla
